<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéRogue Stats Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="text-center">PokéRogue Stats Calculator</h1>

        <div class="controls-bar">
            <label title="Use maximum IVs (31) for all stats">
                <input type="checkbox" id="maxIv"> Max IVs
            </label>
            <label title="Flip/rotate base stats: HP↔Speed, Atk↔SpAtk, Def↔SpDef">
                <input type="checkbox" id="flipStat"> Flip Stat Challenge
            </label>
            <label title="Shuckle Juice: +10% to total BST">
                <input type="checkbox" id="shuckleJuice"> Shuckle Juice
            </label>
            <label title="Old Gateau: +20 to lower stat of each pair">
                <input type="checkbox" id="oldGateau"> Old Gateau
            </label>
        </div>

        <div class="top-buttons">
            <button id="calculateBtn" class="btn-primary">Calculate Stats</button>
            <button id="calculateIvBtn" class="btn-primary">Calculate IVs</button>
            <button id="clearBtn" class="btn-danger">Clear</button>
        </div>

        <div class="main-content two-column">
            <div class="left-panel">
                <h3 id="pokemonTitle">Select Pokémon</h3>
                
                <input type="text" id="search" class="search-input" placeholder="Search Pokémon...">
                <div class="pokemon-list" id="pokemonList"></div>
                
                <div class="pokemon-details" id="pokemonDetails">
                    <div class="pokemon-info-row">
                        <div class="stat-column">
                            <div class="stat-line-container" id="baseStatsDisplay"></div>
                        </div>
                        <div class="sprite-column">
                            <div class="pokemon-sprite" id="pokemonSprite"></div>
                        </div>
                        <div class="pentagon-column">
                            <canvas id="statPentagon" width="140" height="140"></canvas>
                        </div>
                    </div>
                </div>
                
                <div class="panel-section">
                    <div class="settings-row">
                        <div class="filter-section">
                            <label for="nature">Nature</label>
                            <select id="nature">
                                <option value="">Neutral</option>
                                <option value="Adamant">Adamant (+Atk/-SpA)</option>
                                <option value="Bashful">Bashful</option>
                                <option value="Bold">Bold (+Def/-Atk)</option>
                                <option value="Brave">Brave (+Atk/-Spd)</option>
                                <option value="Calm">Calm (+SpD/-Atk)</option>
                                <option value="Careful">Careful (+SpD/-SpA)</option>
                                <option value="Docile">Docile</option>
                                <option value="Gentle">Gentle (+SpD/-Def)</option>
                                <option value="Hardy">Hardy</option>
                                <option value="Hasty">Hasty (+Spd/-Def)</option>
                                <option value="Impish">Impish (+Def/-SpA)</option>
                                <option value="Jolly">Jolly (+Spd/-SpA)</option>
                                <option value="Lax">Lax (+Def/-SpD)</option>
                                <option value="Lonely">Lonely (+Atk/-Def)</option>
                                <option value="Mild">Mild (+SpA/-Def)</option>
                                <option value="Modest">Modest (+SpA/-Atk)</option>
                                <option value="Naive">Naive (+Spd/-SpD)</option>
                                <option value="Naughty">Naughty (+Atk/-SpD)</option>
                                <option value="Quiet">Quiet (+SpA/-Spd)</option>
                                <option value="Quirky">Quirky</option>
                                <option value="Rash">Rash (+SpA/-SpD)</option>
                                <option value="Relaxed">Relaxed (+Def/-Spd)</option>
                                <option value="Sassy">Sassy (+SpD/-Spd)</option>
                                <option value="Serious">Serious</option>
                                <option value="Timid">Timid (+Spd/-Atk)</option>
                            </select>
                        </div>
                        <div class="filter-section small">
                            <label for="level">Level</label>
                            <input type="number" id="level" value="50" min="1" max="99999">
                        </div>
                    </div>
                </div>

                <div class="panel-section">
                    <h4>Held Items</h4>
                    <div class="items-compact">
                        <div class="item-checks">
                            <label><input type="checkbox" id="eviolite"> Eviolite</label>
                            <label><input type="checkbox" id="lightBall"> Light Ball</label>
                            <label><input type="checkbox" id="thickClub"> Thick Club</label>
                            <label><input type="checkbox" id="metalPowder"> Metal Powder</label>
                            <label><input type="checkbox" id="quickPowder"> Quick Powder</label>
                            <label><input type="checkbox" id="deepSeaScale"> Deep Sea Scale</label>
                            <label><input type="checkbox" id="deepSeaTooth"> Deep Sea Tooth</label>
                        </div>
                        <div class="item-row-single">
                            <div class="item-input"><label>Macho Brace</label><input type="number" id="machoBrace" value="0" min="0" max="50"></div>
                            <div class="item-input"><label>Soul Dew</label><input type="number" id="soulDew" value="0" min="0" max="10"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="panel-section">
                    <h4>Stats</h4>
                    <div class="compact-stats-grid">
                        <div class="stat-input"><label>HP</label><input type="number" id="hp" value="0" min="0" max="9999999"></div>
                        <div class="stat-input"><label>Atk</label><input type="number" id="atk" value="0" min="0" max="9999999"></div>
                        <div class="stat-input"><label>Def</label><input type="number" id="def" value="0" min="0" max="9999999"></div>
                        <div class="stat-input"><label>SpA</label><input type="number" id="spAtk" value="0" min="0" max="9999999"></div>
                        <div class="stat-input"><label>SpD</label><input type="number" id="spDef" value="0" min="0" max="9999999"></div>
                        <div class="stat-input"><label>Spd</label><input type="number" id="spd" value="0" min="0" max="9999999"></div>
                    </div>
                </div>

                <div class="panel-section">
                    <h4>IVs</h4>
                    <div class="compact-stats-grid">
                        <div class="stat-input"><label>HP</label><input type="number" id="ivhp" value="15" min="0" max="31" class="default-value"></div>
                        <div class="stat-input"><label>Atk</label><input type="number" id="ivatk" value="15" min="0" max="31" class="default-value"></div>
                        <div class="stat-input"><label>Def</label><input type="number" id="ivdef" value="15" min="0" max="31" class="default-value"></div>
                        <div class="stat-input"><label>SpA</label><input type="number" id="ivspAtk" value="15" min="0" max="31" class="default-value"></div>
                        <div class="stat-input"><label>SpD</label><input type="number" id="ivspDef" value="15" min="0" max="31" class="default-value"></div>
                        <div class="stat-input"><label>Spd</label><input type="number" id="ivspd" value="15" min="0" max="31" class="default-value"></div>
                    </div>
                </div>

                <div class="panel-section">
                    <h4>Vitamins <small>(max = IV, +10% each)</small></h4>
                    <div class="compact-stats-grid">
                        <div class="stat-input"><label>HP Up</label><input type="number" id="vitHP" value="0" min="0" max="31"></div>
                        <div class="stat-input"><label>Protein</label><input type="number" id="vitAtk" value="0" min="0" max="31"></div>
                        <div class="stat-input"><label>Iron</label><input type="number" id="vitDef" value="0" min="0" max="31"></div>
                        <div class="stat-input"><label>Calcium</label><input type="number" id="vitSpAtk" value="0" min="0" max="31"></div>
                        <div class="stat-input"><label>Zinc</label><input type="number" id="vitSpDef" value="0" min="0" max="31"></div>
                        <div class="stat-input"><label>Carbos</label><input type="number" id="vitSpd" value="0" min="0" max="31"></div>
                    </div>
                </div>

                <div class="panel-section terminal-section">
                    <h4>Calculation Log</h4>
                    <div class="terminal" id="calculationLog">
                        <div class="terminal-line">> Select a Pokémon to begin</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="status-bar" id="status-bar">Ready.</div>

    <script src="pokemon_data.js"></script>
    <script src="script.js"></script>
</body>
</html>
